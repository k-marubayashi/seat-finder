<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>座席確認</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f5f0; min-height: 100vh; }
    .app { max-width: 420px; margin: 0 auto; padding: 16px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .logo { text-align: center; padding: 32px 0 24px; }
    .logo-icon { width: 56px; height: 56px; border-radius: 16px; background: #e8f0fe; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 24px; }
    .logo h1 { font-size: 20px; font-weight: 500; color: #1a1a1a; }
    .logo p { font-size: 14px; color: #666; margin-top: 4px; }
    .card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
    .label { font-size: 13px; color: #666; margin-bottom: 6px; }
    input[type=text], input[type=password], textarea {
      width: 100%; font-size: 16px; padding: 10px 12px;
      border: 0.5px solid #ccc; border-radius: 8px;
      outline: none; background: #fff; color: #1a1a1a;
      font-family: inherit;
    }
    input[type=text]:focus, input[type=password]:focus, textarea:focus {
      border-color: #666;
    }
    .btn {
      width: 100%; padding: 12px; border-radius: 8px;
      font-size: 16px; font-weight: 500; cursor: pointer;
      border: none; margin-top: 12px; font-family: inherit;
    }
    .btn-primary { background: #1a1a1a; color: #fff; }
    .btn-primary:hover { background: #333; }
    .btn-secondary {
      background: transparent; border: 0.5px solid #ccc;
      color: #1a1a1a; margin-top: 8px;
    }
    .btn-secondary:hover { background: #f5f5f5; }
    .btn:active { transform: scale(0.98); }
    .seat-result {
      background: #f0faf4; border: 0.5px solid #86efac;
      border-radius: 12px; padding: 20px; margin-bottom: 12px;
    }
    .seat-block { padding: 12px 0; border-bottom: 0.5px solid #86efac; }
    .seat-block:last-child { border-bottom: none; }
    .seat-label { font-size: 12px; color: #16a34a; font-weight: 500; margin-bottom: 2px; }
    .seat-num { font-size: 28px; font-weight: 500; color: #1a1a1a; }
    .seat-tbd { font-size: 16px; color: #666; }
    .person-name { font-size: 14px; color: #666; margin-bottom: 12px; }
    .error-card {
      background: #fef2f2; border: 0.5px solid #fca5a5;
      border-radius: 12px; padding: 16px; margin-bottom: 12px;
      color: #dc2626; font-size: 14px; line-height: 1.6;
    }
    .nav-link { text-align: center; padding: 8px; font-size: 13px; color: #2563eb; cursor: pointer; margin-top: 8px; }
    .nav-link:hover { text-decoration: underline; }
    .hint { font-size: 12px; color: #888; margin-top: 8px; line-height: 1.6; }
    .admin-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .admin-badge {
      background: #fefce8; color: #854d0e; font-size: 11px;
      padding: 2px 8px; border-radius: 20px; border: 0.5px solid #fde68a;
    }
    .stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .stat { background: #f5f5f0; border-radius: 8px; padding: 12px; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 500; color: #1a1a1a; }
    .stat-label { font-size: 12px; color: #666; margin-top: 2px; }
    .section-title { font-size: 13px; font-weight: 500; color: #666; margin-bottom: 8px; }
  </style>
</head>
<body>
<div class="app">

  <!-- 参加者画面 -->
  <div id="s-participant" class="screen active">
    <div class="logo">
      <div class="logo-icon">🪑</div>
      <h1>座席確認</h1>
      <p>以下のいずれかで検索できます</p>
    </div>
    <div class="card">
      <div class="label">社員番号 / 氏名 / フリガナ</div>
      <input type="text" id="search-input" placeholder="例：10000 / 山田花子 / ヤマダハナコ" oninput="clearResult()" />
      <button class="btn btn-primary" onclick="searchSeat()">座席を確認する</button>
      <div class="hint">・半角数字で社員番号<br>・漢字・ひらがな・カタカナすべて対応</div>
    </div>
    <div id="result-area"></div>
    <div class="nav-link" onclick="showScreen('s-admin-login')">主催者の方はこちら</div>
  </div>

  <!-- 管理者ログイン -->
  <div id="s-admin-login" class="screen">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <h1>管理者ログイン</h1>
      <p>主催者専用ページ</p>
    </div>
    <div class="card">
      <div class="label">パスワード</div>
      <input type="password" id="pw-input" placeholder="パスワードを入力" />
      <button class="btn btn-primary" onclick="adminLogin()">ログイン</button>
      <button class="btn btn-secondary" onclick="showScreen('s-participant')">← 参加者画面に戻る</button>
    </div>
    <div id="login-error"></div>
  </div>

  <!-- 管理者ダッシュボード -->
  <div id="s-admin-dash" class="screen">
    <div class="admin-header">
      <span style="font-size:16px; font-weight:500;">管理ダッシュボード</span>
      <span class="admin-badge">主催者</span>
      <span style="margin-left:auto; font-size:13px; color:#666; cursor:pointer;" onclick="adminLogout()">ログアウト</span>
    </div>

    <div class="stat-row">
      <div class="stat">
        <div class="stat-num" id="stat-total">0名</div>
        <div class="stat-label">登録人数</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-second">0名</div>
        <div class="stat-label">後半データあり</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">データ更新</div>
      <div style="font-size:13px; color:#666; margin-bottom:10px; line-height:1.7;">後半座席データが揃ったら、GASで再エクスポートしたJSONをここに貼り付けてください。</div>
      <textarea id="json-input" rows="4" style="font-size:12px; font-family:monospace; resize:vertical;" placeholder='[ { id: "1137", ... } ]'></textarea>
      <button class="btn btn-secondary" style="font-size:14px;" onclick="updateData()">データを更新する</button>
      <div id="update-result" style="margin-top:8px; font-size:13px;"></div>
    </div>

    <div class="card">
      <div class="section-title">動作確認</div>
      <div style="font-size:13px; color:#666; margin-bottom:8px;">社員番号・氏名・フリガナで検索テスト</div>
      <input type="text" id="test-input" placeholder="テスト検索..." />
      <button class="btn btn-secondary" style="font-size:14px;" onclick="testSearch()">検索テスト</button>
      <div id="test-result" style="margin-top:10px; font-size:13px;"></div>
    </div>

    <button class="btn btn-secondary" onclick="showScreen('s-participant')">← 参加者画面を確認</button>
  </div>

</div>

<script>
const ADMIN_PASSWORDS = ['Award2026'];

let sheetData = [
  { id: "1137", name: "半田夏希", kana: "ハンダナツキ", first: "10年勤続-1", second: "" },
  { id: "1855", name: "大園健一郎", kana: "オオゾノケンイチロウ", first: "10年勤続-1", second: "" },
  { id: "1322", name: "大柴康平", kana: "オオシバコウヘイ", first: "10年勤続-1", second: "" },
  { id: "10078", name: "岡朱里", kana: "オカアカリ", first: "運営-1", second: "" },
  { id: "10411", name: "小原萌", kana: "オバラメグミ", first: "運営-1", second: "" },
  { id: "18478", name: "村上大介", kana: "ムラカミダイスケ", first: "運営-1", second: "" },
  { id: "125", name: "丸林薫", kana: "マルバヤシカオル", first: "運営-2", second: "" },
  { id: "3645", name: "藤上友里奈", kana: "フジガミユリナ", first: "運営-2", second: "" },
  { id: "4450", name: "三角藍里", kana: "ミスミアイリ", first: "運営-2", second: "" },
  { id: "7380", name: "脇元海帆", kana: "ワキモトミホ", first: "運営-2", second: "" },
  { id: "11485", name: "四十宮久良々", kana: "ヨソミヤクララ", first: "運営-2", second: "" },
  { id: "18481", name: "長田結", kana: "オサダユイ", first: "運営-2", second: "" },
  { id: "240", name: "小林明子", kana: "コバヤシアキコ", first: "10年勤続-1", second: "" },
  { id: "632", name: "石井奈緒", kana: "イシイナオ", first: "10年勤続-1", second: "" },
  { id: "1521", name: "紺野恵美", kana: "コンノエミ", first: "10年勤続-1", second: "" },
  { id: "1058", name: "齊藤好恵", kana: "サイトウヨシエ", first: "10年勤続-1", second: "" },
  { id: "1657", name: "進士弘子", kana: "シンジヒロコ", first: "10年勤続-1", second: "" },
  { id: "18819", name: "関口葵聖来", kana: "セキグチキセラ", first: "運営-1", second: "" },
  { id: "9955", name: "尾花百香", kana: "オバナモモカ", first: "運営-1", second: "" },
  { id: "14971", name: "田中愛美", kana: "タナカマナミ", first: "運営-1", second: "" },
  { id: "17436", name: "新井梨紗", kana: "アライリサ", first: "運営-1", second: "" },
  { id: "12910", name: "国谷妃菜乃", kana: "クニヤヒナノ", first: "運営-1", second: "" },
  { id: "16855", name: "島影聖菜", kana: "シマカゲセイナ", first: "運営-1", second: "" },
  { id: "5711", name: "中川未菜実", kana: "ナカガワミナミ", first: "運営-1", second: "" }
];

function normalize(s) {
  return s.replace(/\s/g, '').toLowerCase()
    .replace(/[\u3041-\u3096]/g, c => String.fromCharCode(c.charCodeAt(0) + 0x60));
}

function findPerson(q) {
  const nq = normalize(q);
  return sheetData.find(d =>
    d.id === q ||
    normalize(d.name) === nq ||
    normalize(d.kana) === nq
  );
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function searchSeat() {
  const q = document.getElementById('search-input').value.trim();
  const area = document.getElementById('result-area');
  if (!q) { area.innerHTML = ''; return; }
  const found = findPerson(q);
  if (found) {
    const secondHtml = found.second
      ? `<div class="seat-num">${found.second}</div>`
      : `<div class="seat-tbd">後日お知らせします</div>`;
    area.innerHTML = `
      <div class="seat-result">
        <div class="person-name">${found.name}（${found.kana}）</div>
        <div class="seat-block">
          <div class="seat-label">前半</div>
          <div class="seat-num">${found.first}</div>
        </div>
        <div class="seat-block">
          <div class="seat-label">後半</div>
          ${secondHtml}
        </div>
      </div>`;
  } else {
    area.innerHTML = `<div class="error-card">見つかりませんでした。<br>社員番号・氏名・フリガナをご確認ください。</div>`;
  }
}

function clearResult() { document.getElementById('result-area').innerHTML = ''; }

function adminLogin() {
  const pw = document.getElementById('pw-input').value;
  const err = document.getElementById('login-error');
  if (ADMIN_PASSWORDS.includes(pw)) {
    err.innerHTML = '';
    updateStats();
    showScreen('s-admin-dash');
  } else {
    err.innerHTML = '<div class="error-card">パスワードが正しくありません</div>';
  }
}

function adminLogout() {
  document.getElementById('pw-input').value = '';
  showScreen('s-admin-login');
}

function updateStats() {
  document.getElementById('stat-total').textContent = sheetData.length + '名';
  document.getElementById('stat-second').textContent = sheetData.filter(d => d.second).length + '名';
}

function updateData() {
  const raw = document.getElementById('json-input').value.trim();
  const res = document.getElementById('update-result');
  try {
    const parsed = eval('(' + raw + ')');
    if (!Array.isArray(parsed)) throw new Error();
    sheetData = parsed;
    updateStats();
    res.innerHTML = `<span style="color:#16a34a;">✓ ${parsed.length}件に更新しました</span>`;
    document.getElementById('json-input').value = '';
  } catch(e) {
    res.innerHTML = `<span style="color:#dc2626;">データの形式が正しくありません</span>`;
  }
}

function testSearch() {
  const q = document.getElementById('test-input').value.trim();
  const res = document.getElementById('test-result');
  if (!q) { res.textContent = ''; return; }
  const found = findPerson(q);
  res.innerHTML = found
    ? `<span style="color:#16a34a;">✓ ${found.name}　前半：${found.first}　後半：${found.second || '未設定'}</span>`
    : `<span style="color:#dc2626;">見つかりません</span>`;
}

document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') searchSeat(); });
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });
document.getElementById('test-input').addEventListener('keydown', e => { if (e.key === 'Enter') testSearch(); });
</script>
</body>
</html>
