    input[type=text], input[type=password], textarea {
      width: 100%; font-size: 16px; padding: 10px 12px;

      font-family: inherit;
    }
    input[type=text]:focus, input[type=password]:focus, textarea:focus { border-color: #666; }
    .btn {
      width: 100%; padding: 12px; border-radius: 8px;
      font-size: 16px; font-weight: 500; cursor: pointer;
      border: none; margin-top: 12px; font-family: inherit;
    }
    .btn-primary { background: #5C1A2E; color: #fff; }
    .btn-primary:hover { background: #7A2240; }
    .btn-secondary { background: transparent; border: 0.5px solid #ccc; color: #1a1a1a; margin-top: 8px; }
    .btn-secondary:hover { background: #f5f5f5; }
    .btn:active { transform: scale(0.98); }
    .seat-result { background: #f0faf4; border: 0.5px solid #86efac; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
    .seat-block { padding: 12px 0; border-bottom: 0.5px solid #86efac; }
    .seat-block:last-child { border-bottom: none; }
    .seat-label { font-size: 12px; color: #16a34a; font-weight: 500; margin-bottom: 2px; }
    .seat-num { font-size: 28px; font-weight: 500; color: #1a1a1a; }
    .seat-tbd { font-size: 16px; color: #666; }
    .person-name { font-size: 14px; color: #666; margin-bottom: 12px; }
    .error-card { background: #fef2f2; border: 0.5px solid #fca5a5; border-radius: 12px; padding: 16px; margin-bottom: 12px; color: #dc2626; font-size: 14px; line-height: 1.6; }
    .multi-result { margin-bottom: 12px; }
    .multi-item { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
    .multi-item:hover { background: #f5f5f0; }
    .multi-item-name { font-size: 15px; font-weight: 500; color: #1a1a1a; }
    .multi-item-kana { font-size: 12px; color: #888; margin-top: 2px; }
    .multi-item-arrow { color: #aaa; font-size: 18px; }
    .multi-label { font-size: 13px; color: #666; margin-bottom: 8px; }
    .back-link { font-size: 13px; color: #2563eb; cursor: pointer; margin-bottom: 12px; display: inline-block; }
    .nav-link { text-align: center; padding: 8px; font-size: 13px; color: #2563eb; cursor: pointer; margin-top: 8px; }
    .nav-link:hover { text-decoration: underline; }
    .hint { font-size: 12px; color: #888; margin-top: 8px; line-height: 1.6; }

    .admin-badge { background: #fefce8; color: #854d0e; font-size: 11px; padding: 2px 8px; border-radius: 20px; border: 0.5px solid #fde68a; }

    .stat { background: #f5f5f0; border-radius: 8px; padding: 12px; text-align: center; }
    .stat-num { font-size: 22px; font-weight: 500; color: #1a1a1a; }
    .stat-label { font-size: 12px; color: #666; margin-top: 2px; }

    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; width: 100%; max-width: 600px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }

</head>

function normalize(s) {
  return s.replace(/\s/g, '');
}

function searchPeople(q) {
  const nq = normalize(q);
  if (/^\d+$/.test(q)) {
    return sheetData.filter(d => d.id === q);
  }
  return sheetData.filter(d =>
    normalize(d.name).includes(nq) ||
    normalize(d.kana).includes(nq)
  );
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderSeatResult(person) {
  const secondHtml = person.second
    ? `<div class="seat-num">${person.second}</div>`
    : `<div class="seat-tbd">後日お知らせします</div>`;
  return `
    <div class="seat-result">
      <div class="person-name">${person.name}（${person.kana}）</div>
      <div class="seat-block">
        <div class="seat-label">前半</div>
        <div class="seat-num">${person.first}</div>
      </div>
      <div class="seat-block">
        <div class="seat-label">後半</div>
        ${secondHtml}
      </div>
    </div>
    <button class="btn-venue" onclick="document.getElementById('venue-modal').classList.add('open')">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="14" height="14" rx="3" fill="#F5E8C0" stroke="#C8A84B" stroke-width="1.8"/><circle cx="5" cy="5.5" r="1.2" fill="#8B6914"/><circle cx="8" cy="5.5" r="1.2" fill="#8B6914"/><circle cx="11" cy="5.5" r="1.2" fill="#8B6914"/><circle cx="5" cy="8.5" r="1.2" fill="#8B6914"/><circle cx="8" cy="8.5" r="1.2" fill="#8B6914"/><circle cx="11" cy="8.5" r="1.2" fill="#8B6914"/></svg>
      座席位置を確認する
    </button>`;
}

function searchSeat() {
  const q = document.getElementById('search-input').value.trim();
  const area = document.getElementById('result-area');
  if (!q) { area.innerHTML = ''; return; }
  if (!searchEnabled) {
    area.innerHTML = '<div class="error-card">検索期間は終了しました。</div>';
    return;
  }

  const results = searchPeople(q);

  if (results.length === 0) {
    area.innerHTML = `<div class="error-card">見つかりませんでした。<br>社員番号・氏名・フリガナをご確認ください。</div>`;
  } else if (results.length === 1) {
    area.innerHTML = renderSeatResult(results[0]);
  } else {
    const items = results.map((p, i) => `
      <div class="multi-item" onclick="selectPerson(${i})">
        <div>
          <div class="multi-item-name">${p.name}</div>
          <div class="multi-item-kana">${p.kana}　社員番号：${p.id}</div>
        </div>
        <div class="multi-item-arrow">›</div>
      </div>`).join('');
    area.innerHTML = `
      <div class="multi-result">
        <div class="multi-label">${results.length}件見つかりました。お名前を選んでください：</div>
        ${items}
      </div>`;
    window._multiResults = results;
  }
}

function selectPerson(index) {
  const area = document.getElementById('result-area');
  const person = window._multiResults[index];
  area.innerHTML = `
    <span class="back-link" onclick="searchSeat()">← 検索結果に戻る</span>
    ${renderSeatResult(person)}`;
}

function clearResult() { document.getElementById('result-area').innerHTML = ''; }

function adminLogin() {
  const pw = document.getElementById('pw-input').value;
  const err = document.getElementById('login-error');
  if (ADMIN_PASSWORDS.includes(pw)) {
    err.innerHTML = '';
    updateStats();
    updateSearchToggleUI();
    showScreen('s-admin-dash');
  } else {
    err.innerHTML = '<div class="error-card">パスワードが正しくありません</div>';
  }
}

function adminLogout() {
  document.getElementById('pw-input').value = '';
  showScreen('s-admin-login');
}

function updateStats() {
  document.getElementById('stat-total').textContent = sheetData.length + '名';
  document.getElementById('stat-second').textContent = sheetData.filter(d => d.second).length + '名';
}

function updateData() {
  const raw = document.getElementById('json-input').value.trim();
  const res = document.getElementById('update-result');
  try {
    const parsed = eval('(' + raw + ')');
    if (!Array.isArray(parsed)) throw new Error();
    sheetData = parsed;
    updateStats();
    res.innerHTML = `<span style="color:#16a34a;">✓ ${parsed.length}件に更新しました</span>`;
    document.getElementById('json-input').value = '';
  } catch(e) {
    res.innerHTML = `<span style="color:#dc2626;">データの形式が正しくありません</span>`;
  }
}

function testSearch() {
  const q = document.getElementById('test-input').value.trim();
  const res = document.getElementById('test-result');
  if (!q) { res.textContent = ''; return; }
  const results = searchPeople(q);
  if (results.length === 0) {
    res.innerHTML = `<span style="color:#dc2626;">見つかりません</span>`;
  } else {
    res.innerHTML = results.map(p =>
      `<div style="color:#16a34a; margin-bottom:4px;">✓ ${p.name}　前半：${p.first}　後半：${p.second || '未設定'}</div>`
    ).join('');
  }
}

function toggleSearch() {
  searchEnabled = !searchEnabled;
  localStorage.setItem("searchEnabled", searchEnabled);
  updateSearchToggleUI();
}

function updateSearchToggleUI() {
  const btn = document.getElementById('toggle-search-btn');
  const txt = document.getElementById('search-status-text');
  if (!btn || !txt) return;
  if (searchEnabled) {
    btn.textContent = '終了にする';
    btn.style.background = '#5C1A2E';
    txt.textContent = '現在：受付中';
  } else {
    btn.textContent = '受付を再開する';
    btn.style.background = '#888';
    txt.textContent = '現在：終了中';
  }
}

function togglePw() {
  const input = document.getElementById('pw-input');
  const eye = document.getElementById('pw-eye');
  const eyeOff = document.getElementById('pw-eye-off');
  if (input.type === 'password') {
    input.type = 'text';
    eye.style.display = 'none';
    eyeOff.style.display = 'block';
  } else {
    input.type = 'password';
    eye.style.display = 'block';
    eyeOff.style.display = 'none';
  }
}

function closeVenueModal(event) {
  if (event.target === document.getElementById('venue-modal')) {
    document.getElementById('venue-modal').classList.remove('open');
  }
}

document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') searchSeat(); });
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') adminLogin(); });
document.getElementById('test-input').addEventListener('keydown', e => { if (e.key === 'Enter') testSearch(); });
</script>
